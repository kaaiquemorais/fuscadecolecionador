<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fusca 1500 · 1972 · Placa Preta</title>
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold:   #C9A24A;
    --black:  #111111;
    --cream:  #E8D8B5;
    --silver: #BFC1C2;
    --white:  #F5F5F0;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    min-height: 100%;
    background: var(--black);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100svh;
    padding: 2.5rem 1.5rem;
    background-image:
      radial-gradient(ellipse 60% 50% at 50% 0%, rgba(201,162,74,0.07) 0%, transparent 70%);
  }

  .card {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* ── Foto do carro ── */
  .avatar {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    border: 1.5px solid rgba(201,162,74,0.5);
    overflow: hidden;
    margin-bottom: 1.4rem;
    position: relative;
  }
  .avatar::before {
    content: '';
    position: absolute;
    inset: 5px;
    border-radius: 50%;
    border: 1px solid rgba(201,162,74,0.2);
    z-index: 1;
    pointer-events: none;
  }
  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.88) saturate(0.9);
  }

  /* ── Nome e sub ── */
  .name {
    font-family: 'Playfair Display', serif;
    font-size: 1.55rem;
    font-weight: 700;
    color: var(--white);
    letter-spacing: -0.01em;
    text-align: center;
    line-height: 1.1;
  }
  .name em { color: var(--gold); font-style: normal; }

  .rule {
    width: 32px;
    height: 1px;
    background: var(--gold);
    margin: 1rem auto;
    opacity: 0.6;
  }

  .sub {
    font-size: 0.64rem;
    letter-spacing: 0.38em;
    text-transform: uppercase;
    color: var(--silver);
    text-align: center;
    margin-bottom: 2.5rem;
  }

  /* ── Efeito shiny (borda giratória) ── */
  @property --angle {
    syntax: '<angle>';
    inherits: false;
    initial-value: 0deg;
  }
  @keyframes spin-border { to { --angle: 360deg; } }
  @keyframes shimmer-sweep {
    0%   { left: -80%; opacity: 0; }
    10%  { opacity: 1; }
    100% { left: 120%; opacity: 0; }
  }

  /* ── Links ── */
  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .link-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.85rem;
    width: 100%;
    padding: 1rem 1.5rem;
    text-decoration: none;
    color: var(--white);
    border-radius: 8px;
    position: relative;
    isolation: isolate;
    transition: transform 0.18s ease;
    text-align: center;
    border: none;
    background: transparent;
    cursor: pointer;
  }
  .link-btn:active { transform: scale(0.98); }

  /* Borda giratória */
  .link-btn::before {
    content: '';
    position: absolute;
    inset: -1.5px;
    z-index: -2;
    border-radius: 9.5px;
    background: conic-gradient(
      from var(--angle),
      transparent  0%,
      transparent 60%,
      #C9A24A     72%,
      #fff8dc     82%,
      #C9A24A     90%,
      transparent 100%
    );
    animation: spin-border 2.8s linear infinite;
  }

  /* Fundo interno escuro */
  .link-btn::after {
    content: '';
    position: absolute;
    inset: 1px;
    z-index: -1;
    border-radius: 7px;
    background: rgba(12,10,7,0.92);
  }

  /* Shimmer no conteúdo */
  .link-btn .inner {
    position: relative;
    z-index: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.85rem;
    width: 100%;
    overflow: hidden;
  }
  .link-btn .inner::before {
    content: '';
    position: absolute;
    top: -30%; left: -80%;
    width: 45%; height: 160%;
    background: linear-gradient(90deg, transparent, rgba(255,248,200,0.18), transparent);
    transform: skewX(-18deg);
    opacity: 0;
  }
  .link-btn:hover .inner::before { animation: shimmer-sweep 0.7s ease forwards; }

  .btn-icon {
    width: 36px;
    height: 36px;
    border-radius: 5px;
    background: rgba(201,162,74,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    color: var(--gold);
  }
  .btn-icon svg { width: 18px; height: 18px; fill: currentColor; }

  .btn-text { display: flex; flex-direction: column; gap: 1px; align-items: flex-start; }
  .btn-label {
    font-size: 0.88rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    color: var(--white);
  }
  .btn-sub {
    font-size: 0.67rem;
    color: rgba(232,216,181,0.42);
    letter-spacing: 0.02em;
  }

  /* ── Rodapé ── */
  .footer {
    margin-top: 2.5rem;
    font-size: 0.6rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: rgba(232,216,181,0.18);
    text-align: center;
  }
</style>
</head>
<body>
